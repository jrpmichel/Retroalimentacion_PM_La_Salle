name: Acuerdo de reunión
description: Registrar acuerdos, responsables, fechas y evidencias esperadas.
title: "[Acuerdo] "
labels: ["acuerdo", "por-revisar"]
body:
  - type: input
    id: acuerdo
    attributes:
      label: Acuerdo
      placeholder: Describa el acuerdo de forma breve.
    validations:
      required: true

  - type: textarea
    id: descripcion
    attributes:
      label: Descripción del acuerdo
      placeholder: Explique el alcance del acuerdo.
    validations:
      required: false

  - type: input
    id: responsable
    attributes:
      label: Responsable
      placeholder: Nombre o equipo responsable
    validations:
      required: true

  - type: input
    id: fecha
    attributes:
      label: Fecha estimada
      placeholder: DD/MM/AAAA
    validations:
      required: false

  - type: textarea
    id: evidencia
    attributes:
      label: Evidencia esperada
      placeholder: Documento revisado, matriz actualizada, minuta, versión corregida, etc.
    validations:
      required: false

  - type: dropdown
    id: estado
    attributes:
      label: Estado inicial
      options:
        - Por revisar
        - En proceso
        - Requiere validación
    validations:
      required: true
