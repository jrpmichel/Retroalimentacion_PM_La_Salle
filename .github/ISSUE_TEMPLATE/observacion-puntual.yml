name: Observación puntual
description: Registrar una observación específica sobre una asignatura, unidad, tema o sección.
title: "[Observación] "
labels: ["retroalimentacion-docente", "por-revisar"]
body:
  - type: markdown
    attributes:
      value: |
        Use esta plantilla para registrar una observación concreta. Se recomienda evitar comentarios generales sin propuesta operativa.

  - type: input
    id: nombre
    attributes:
      label: Nombre del participante
      placeholder: Nombre completo
    validations:
      required: true

  - type: dropdown
    id: campus
    attributes:
      label: Campus
      options:
        - Campestre
        - Américas
        - San Francisco
        - Otro
    validations:
      required: true

  - type: input
    id: correo
    attributes:
      label: Correo institucional
      placeholder: usuario@lasallebajio.edu.mx
    validations:
      required: false

  - type: dropdown
    id: asignatura
    attributes:
      label: Asignatura o sección
      options:
        - PM I — Pensamiento Aritmético
        - PM II — Introducción al Álgebra
        - PM III — Pensamiento Algebraico e Introducción a Geometría Plana
        - PM IV — Trigonometría y Geometría Analítica
        - PM V — Cálculo Diferencial
        - PM VI — Pensamiento Estadístico y Probabilístico
        - PM6_CalDif — Cálculo Diferencial Aplicado y Modelación Variacional
        - Serie completa PM I–VI
        - Otro / comentario transversal
    validations:
      required: true

  - type: input
    id: unidad
    attributes:
      label: Unidad, tema o sección específica
      placeholder: Ejemplo: Unidad 3, evaluación, ejercicios, proyecto integrador, PM6_CalDif, etc.
    validations:
      required: true

  - type: checkboxes
    id: tipo
    attributes:
      label: Tipo de observación
      options:
        - label: Pedagógica
        - label: Didáctica
        - label: Curricular
        - label: Lasallista
        - label: Normativa
        - label: Evaluación
        - label: Editorial / redacción
        - label: Recursos digitales
        - label: Otro
    validations:
      required: true

  - type: dropdown
    id: prioridad
    attributes:
      label: Prioridad
      options:
        - Alta
        - Media
        - Baja
    validations:
      required: true

  - type: textarea
    id: observacion
    attributes:
      label: Observación específica
      description: Indique con precisión qué aspecto se observa.
      placeholder: Describa la observación.
    validations:
      required: true

  - type: textarea
    id: justificacion
    attributes:
      label: Justificación
      description: Explique por qué requiere ajuste, conservación, eliminación o fortalecimiento.
      placeholder: Justifique la observación.
    validations:
      required: true

  - type: textarea
    id: propuesta
    attributes:
      label: Propuesta concreta
      description: Indique el ajuste sugerido de forma operativa.
      placeholder: Proponga una acción concreta.
    validations:
      required: true

  - type: textarea
    id: evidencia
    attributes:
      label: Evidencia o referencia interna
      description: Puede indicar página, unidad, sección, experiencia en aula o documento relacionado.
      placeholder: Ejemplo: PM II, Unidad 4; experiencia en grupos de segundo semestre; matriz curricular.
    validations:
      required: false
